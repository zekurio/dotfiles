
# Windowrules
windowrulev2 = float, class: (steam)
windowrulev2 = float, center, class: (.*), title: (Open .*)
windowrulev2 = float, center, title: (alacritty-util), class: (Alacritty)
windowrulev2 = float, silent, class: (thunar)
windowrulev2 = float, class: (nwg-look)
windowrulev2 = float, class: (seahorse)
windowrulev2 = float, class: (mpv)
windowrulev2 = float, class: (com.github.weclaw1.ImageRoll)
windowrulev2 = float, class: (1Password)
windowrulev2 = float, class: (pavucontrol)

# idle inhibit
windowrulev2 = idleinhibit fullscreen, class: ^(.*)$

