
# Windowrules
windowrulev2 = stayfocused, title:^()$,class:^(steam)$
windowrulev2 = minsize 1 1, title:^()$,class:^(steam)$
windowrulev2 = float, center, title:^()$,class:^(steam)$
windowrulev2 = size 1280px 720px, title:^()$,class:^(steam)$
windowrulev2 = float, center, class: (.*), title: (Open .*)
windowrulev2 = size 1280px 720px, class: (.*), title: (Open .*)
windowrulev2 = float, center, class: (firefox), title: (Opening .*)
windowrulev2 = float, center, class: (kitty-util)
windowrulev2 = size 1280px 720px, class: (kitty-util)
windowrulev2 = float, center, class: (Thunar)
windowrulev2 = size 1280px 720px, class: (Thunar)
windowrulev2 = float, center, class: (nwg-look)
windowrulev2 = size 1280px 720px, class: (nwg-look)
windowrulev2 = float, center, class: (mpv)
windowrulev2 = size 1280px 720px, class: (mpv)
windowrulev2 = float, center, class: (eog)
windowrulev2 = size 1280px 720px, class: (eog)
windowrulev2 = float, center, class: (1Password)
windowrulev2 = size 1280px 720px, class: (1Password)
windowrulev2 = float, center, class: (pavucontrol)
windowrulev2 = size 1280px 720px, class: (pavucontrol)
windowrulev2 = float, center, class: (openrgb)
windowrulev2 = size 1280px 720px, class: (openrgb)
windowrulev2 = float, center, class: (coolercontrol)
windowrulev2 = size 1280px 720px, class: (coolercontrol)
windowrulev2 = float, center, class: (bottles)
windowrulev2 = size 1280px 720px, class: (bottles)
windowrulev2 = float, center, class: (kitty), title: (btop)
windowrulev2 = size 1280px 720px, class: (kitty), title: (btop)
# idle inhibit
windowrulev2 = idleinhibit fullscreen, class: ^(.*)$

# transparency
windowrulev2 = opacity 0.95, class: ^(.*)$
windowrulev2 = opacity 1, fullscreen:1
windowrulev2 = opacity 1, class: (mpv)
windowrulev2 = opacity 1, class: (Brave-browser), title: ^(.*(Netflix|Crunchyroll|YouTube|Twitch|Prime).*)$
windowrulev2 = opacity 1, class: (firefox), title: ^(.*(Netflix|Crunchyroll|YouTube|Twitch|Prime).*)$
#windowrulev2 = opacity 1, class: ^(firefox)$

# Move all browsers to workspace 1
windowrulev2 = workspace 1, class:^(firefox|chrome|brave-browser)$

# Move all discord windows to workspace 2
windowrulev2 = workspace 2, class:^(discord)$

# Move all spotify windows to workspace 3
windowrulev2 = workspace 3, class:^(Spotify)$

# Move all coding related windows (vscodium/intellij) to workspace 4
windowrulev2 = workspace 4, class:^(codium-url-handler|jetbrains-idea)$

# Move all kitty windows to workspace 5
windowrulev2 = workspace 5, class:^(kitty)$