source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/environment.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/layerrules.conf

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, 1920x1080@120, auto, 1

# desktop
#monitor = DP-2, 2560x1440@165, auto, 1

# No per-device options, since I only have a single keyboard and mouse
input {
    # For all categories, see https://wiki.hyprland.org/Configuring/Variables/

    # Keyboard
    kb_layout = de

    # Mouse
    follow_mouse = 2
    mouse_refocus = false
    accel_profile = flat
    sensitivity = 0

    touchpad {
        disable_while_typing = true
        natural_scroll = true
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(89b4faFF)
    col.inactive_border = rgba(181825FF)
    layout = dwindle
    cursor_inactive_timeout = 0
}

decoration {
    blur {
        enabled = false
        size = 8
        passes = 2
        new_optimizations = true
    }
    rounding = 10
    drop_shadow = false
    shadow_range = 30
    shadow_render_power = 4
    col.shadow = rgba(00000080)
}

animations {
    enabled = false
    bezier = customBezier, 0.05, 0.9, 0.1, 1.00
    animation = windows, 1, 5, customBezier, popin 75%
    animation = border, 1, 5, customBezier
    animation = fade, 1, 5, customBezier
    animation = workspaces, 1, 5, customBezier, slide
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = 1
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    no_direct_scanout = true
    allow_session_lock_restore = true
    vrr = 2
    vfr = true
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_is_master = true
}
